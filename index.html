<!DOCTYPE html>
<html lang="es">
<head>
    <title>Te entrego mi corazón</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            background-image: url('https://thumbs.dreamstime.com/b/paisajes-de-yosemite-46208063.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 0;
        }

        canvas {
            display: block;
            position: relative;
            z-index: 1;
        }

        #tituloElegante {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: 45px;
            font-weight: bold;
            text-align: center;
            z-index: 5;
            opacity: 0; 
            transition: opacity 2s ease-in-out;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8), 0px 2px 5px rgba(0, 0, 0, 0.9);
        }

        /* --- Estilo del botón con animación de LATIDO --- */
        #btnMensaje {
            display: none; 
            position: absolute;
            z-index: 10;
            padding: 15px 35px;
            background-color: #b91d1d;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(185, 29, 29, 0.6);
            transition: background-color 0.3s;
            animation: latidoBoton 1.2s infinite ease-in-out;
        }

        #btnMensaje:hover {
            background-color: #ff4d6d;
        }

        @keyframes latidoBoton {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(185, 29, 29, 0.5); }
            50% { transform: scale(1.08); box-shadow: 0 4px 25px rgba(255, 77, 109, 0.8); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(185, 29, 29, 0.5); }
        }
/* --- NUEVO: Ajuste dinámico para pantallas de celular --- */
@media (max-width: 768px) {
    #tituloElegante {
        font-size: 30px; /* Letra un poco más pequeña en celular para que no sature */
        top: 8%;
    }
    #btnMensaje {
        padding: 12px 28px;
        font-size: 16px; /* Botón cómodo para el dedo en móviles */
    }
}

    </style>
</head>
<body>

<audio id="musicaFondo" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<h1 id="tituloElegante">Para una persona especial</h1>

<button id="btnMensaje" onclick="window.location.href='TU_PAGINA_AQUI.html'">
    Presioname <3
</button>

<canvas id="heartCanvas"></canvas>

<script src="scripts.js"></script>
</body>
</html>
